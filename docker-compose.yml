version: '3'
services:
  back:
    container_name: back-time-manager
    build: .
    env_file:
    - ./.env
    ports:
      - "4000:4000"
    depends_on:
      - db
    command: /app/entrypoint.sh
    volumes:
      - .:/app
  db:
    image: postgres:latest
    container_name: db-time-manager
    ports:
    - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: time_manager_dev