openapi: 3.0.3
info:
  title: Gothame time manager 
  version: 1.0.0
servers:
  - url: https://petstore3.swagger.io/api/v3
tags:
  - name: user
    description: Crud user
  - name: workingtimes
    description: Crud workingtimes
  - name: clock
    description: Crud clock
  - name: graph
    description: get data about graph
paths:
  /users:
    post:
      tags:
        - user
      summary: Create user
      description: Route to create user
      requestBody:
        description: Mandatory info
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        default:
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users/login:
    post:
      tags:
        - user
      summary: Logs user into the system
      description: ''
      operationId: loginUser
      requestBody:
        description: Mandatory info
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: John
                email:
                  type: string
                  example: John@john.com
                password:
                  type: string
                  example: ajekhaekh
      responses:
        default:
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /users/logout:
    get:
      tags:
        - user
      summary: Logs out current logged in user session
      description: ''
      operationId: logoutUser
      parameters: []
      responses:
        default:
          description: successful operation
  /users/{userId}:
    get:
      tags:
        - user
      summary: Get user by user id
      description: ''
      operationId: getUserByName
      parameters:
        - name: userId
          in: path
          description: ''
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'   
    put:
      tags:
        - user
      summary: Update user
      description: This can only be done by the logged in user.
      operationId: updateUser
      parameters:
        - name: userId
          in: path
          description: ''
          required: true
          schema:
            type: integer
      requestBody:
        description: Update an existent user in the store
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        default:
          description: successful operation
    delete:
      tags:
        - user
      summary: Delete user
      description: Delete the user
      operationId: deleteUser
      parameters:
        - name: userId
          in: path
          description: ''
          required: true
          schema:
            type: integer
      responses:
        '404':
          description: User not found
  /workingtimes:
    post:
        tags:
          - workingtimes
        summary: Create workingtime
        description: Route to workingtime
        requestBody:
          description: Mandatory info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workingtime'
        responses:
          default:
            description: successful operation
components:
  schemas:
    LoginResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            _id:
              type: integer
              example: 1
            username:
              type: string
              example: John
            email:
              type: string
              example: John@john.com
            password:
              type: string
              example: akzhejha
            role: 
              type: string
              example: employee
            managerId:
              type: integer
              example: 2
            teamsId:
              type: integer
              example: 8
            managedTeams:
              type: array
              items:
                type: integer
                example: 8
        clock: 
            type: object
            properties:
              status:
                type: boolean
                example: true
              start:
                type: string
                example: 2023-10-29T12:00:00
              end:
                type: string
                example:
        workingTimes:
          type: array
          items:
            type: object
            properties:
              start:
                type: string
                example: "2023-10-29T08:00:00"
              end:
                type: string
                example: "2023-10-29T18:00:00"
    Workingtime:
      type: object
      properties: 
        start: 
          type: string
          example: 2023-10-27T10:00:00
        end:
          type: string
          example: 2023-10-27T17:00:00
        userId:
          type: integer
          example: 1
    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        petId:
          type: integer
          format: int64
          example: 198772
        quantity:
          type: integer
          format: int32
          example: 7
        shipDate:
          type: string
          format: date-time
        status:
          type: string
          description: Order Status
          example: approved
          enum:
            - placed
            - approved
            - delivered
        complete:
          type: boolean
      xml:
        name: order
    Customer:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 100000
        username:
          type: string
          example: fehguy
        address:
          type: array
          xml:
            name: addresses
            wrapped: true
          items:
            $ref: '#/components/schemas/Address'
      xml:
        name: customer
    Address:
      type: object
      properties:
        street:
          type: string
          example: 437 Lytton
        city:
          type: string
          example: Palo Alto
        state:
          type: string
          example: CA
        zip:
          type: string
          example: '94301'
      xml:
        name: address
    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Dogs
      xml:
        name: category
    User:
      type: object
      properties:
        username:
          type: string
          example: John
        email:
          type: string
          example: John@john.com
      xml:
        name: user
    UserUpdate:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: John2@john.com
    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      xml:
        name: tag
    Pet:
      required:
        - name
        - photoUrls
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: doggie
        category:
          $ref: '#/components/schemas/Category'
        photoUrls:
          type: array
          xml:
            wrapped: true
          items:
            type: string
            xml:
              name: photoUrl
        tags:
          type: array
          xml:
            wrapped: true
          items:
            $ref: '#/components/schemas/Tag'
        status:
          type: string
          description: pet status in the store
          enum:
            - available
            - pending
            - sold
      xml:
        name: pet
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        type:
          type: string
        message:
          type: string
      xml:
        name: '##default'
  requestBodies:
    Pet:
      description: Pet object that needs to be added to the store
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Pet'
        application/xml:
          schema:
            $ref: '#/components/schemas/Pet'
    UserArray:
      description: List of user object
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/User'
  securitySchemes:
    petstore_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://petstore3.swagger.io/oauth/authorize
          scopes:
            write:pets: modify pets in your account
            read:pets: read your pets
    api_key:
      type: apiKey
      name: api_key
      in: header